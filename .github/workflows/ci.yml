name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract tool + dashboard tests
        run: node --test "tools/*.test.mjs"
      - name: Link check (dashboard, guide, docs)
        run: node tools/check-links.mjs
